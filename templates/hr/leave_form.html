{% extends 'base.html' %}
{% block title %}Apply Leave{% endblock %}
{% block page_title %}Apply Leave{% endblock %}
{% block content %}
<div class="crm-card" style="max-width:600px;">
  <div class="crm-card-header"><span class="crm-card-title">Leave Application</span></div>
  <div class="p-4">
    <form method="post">
      {% csrf_token %}
      <div class="row g-3">
        <div class="col-12"><label class="form-label fw-medium">Employee</label>{{ form.employee }}</div>
        <div class="col-12"><label class="form-label fw-medium">Leave Type</label>{{ form.leave_type }}</div>
        <div class="col-md-6"><label class="form-label fw-medium">Start Date</label>{{ form.start_date }}</div>
        <div class="col-md-6"><label class="form-label fw-medium">End Date</label>{{ form.end_date }}</div>
        <div class="col-12"><label class="form-label fw-medium">Reason</label>{{ form.reason }}</div>
      </div>
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">Submit Application</button>
        <a href="{% url 'leave_list' %}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
