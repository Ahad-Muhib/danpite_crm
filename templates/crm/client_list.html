{% extends 'base.html' %}
{% block content %}
<div class="section-head">
  <h1>Clients</h1>
  <a class="button" href="{% url 'client-create' %}">Add Client</a>
</div>
<div class="table-wrap">
  <table>
    <tr><th>Name</th><th>Company</th><th>Email</th><th>Phone</th><th>Invoices</th></tr>
    {% for client in clients %}
      <tr>
        <td>{{ client.name }}</td>
        <td>{{ client.company }}</td>
        <td>{{ client.email }}</td>
        <td>{{ client.phone }}</td>
        <td>{{ client.invoice_count }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="5">No clients yet.</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
