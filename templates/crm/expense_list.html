{% extends 'base.html' %}
{% block content %}
<div class="section-head">
  <h1>Expenses</h1>
  <a class="button" href="{% url 'expense-create' %}">Add Expense</a>
</div>
<div class="table-wrap">
  <table>
    <tr><th>Date</th><th>Title</th><th>Category</th><th>Amount</th></tr>
    {% for expense in expenses %}
      <tr>
        <td>{{ expense.date }}</td>
        <td>{{ expense.title }}</td>
        <td>{{ expense.category }}</td>
        <td>{{ expense.amount }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No expenses yet.</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
