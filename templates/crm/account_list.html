{% extends 'base.html' %}
{% block content %}
<div class="section-head">
  <h1>Accounts</h1>
  <a class="button" href="{% url 'account-create' %}">Add Entry</a>
</div>
<section class="panel">
  <p class="balance">Current balance: {{ balance }}</p>
</section>
<div class="table-wrap">
  <table>
    <tr><th>Date</th><th>Type</th><th>Title</th><th>Amount</th></tr>
    {% for entry in entries %}
      <tr>
        <td>{{ entry.date }}</td>
        <td>{{ entry.get_entry_type_display }}</td>
        <td>{{ entry.title }}</td>
        <td>{{ entry.amount }}</td>
      </tr>
    {% empty %}
      <tr><td colspan="4">No account entries yet.</td></tr>
    {% endfor %}
  </table>
</div>
{% endblock %}
